<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Account Position Sizer | Pro Trader Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #151b2d;
            --accent-gold: #ffd700;
            --accent-green: #00d084;
            --accent-red: #ff4757;
            --text-primary: #e8eaf6;
            --text-secondary: #94a3b8;
            --border: #2d3748;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 208, 132, 0.05) 0%, transparent 20%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Global Settings */
        .global-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            padding: 0.875rem 1rem;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        /* Account Cards */
        .accounts-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #ffb700);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.3);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-danger:hover {
            background: #ff3344;
        }

        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .account-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-green));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .account-card:hover::before {
            transform: scaleX(1);
        }

        .account-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4);
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .account-name-input {
            font-size: 1.25rem;
            font-weight: 700;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-primary);
            padding: 0.25rem 0;
            width: 70%;
        }

        .account-name-input:focus {
            outline: none;
            border-bottom-color: var(--accent-gold);
        }

        .account-fields {
            display: grid;
            gap: 1rem;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .input-group label {
            font-size: 0.75rem;
        }

        .input-group input {
            padding: 0.625rem;
            font-size: 0.95rem;
        }

        /* Results */
        .result-box {
            background: linear-gradient(135deg, rgba(0, 208, 132, 0.1), rgba(0, 208, 132, 0.05));
            border: 2px solid var(--accent-green);
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1rem;
            text-align: center;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0, 208, 132, 0.3);
        }

        .result-detail {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* Quick Actions */
        .quick-actions {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: var(--bg-dark);
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Summary Panel */
        .summary-panel {
            background: linear-gradient(135deg, var(--bg-card), rgba(255, 215, 0, 0.05));
            border-radius: 16px;
            padding: 2rem;
            border: 2px solid var(--accent-gold);
            position: sticky;
            bottom: 2rem;
            box-shadow: 0 20px 60px -10px rgba(0,0,0,0.5);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .summary-item h3 {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .summary-item .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-gold);
        }

        /* XAGUSD Specific Fields */
        .xagusd-fields {
            display: none;
        }

        .xagusd-fields.active {
            display: grid;
            gap: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .accounts-grid { grid-template-columns: 1fr; }
            .field-row { grid-template-columns: 1fr; }
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .calculating {
            animation: pulse 1.5s infinite;
        }

        /* Copy notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-green);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Multi-Account Position Sizer</h1>
            <p class="subtitle">Professional Lot Size Calculator for Multiple Trading Accounts</p>
        </header>

        <!-- Global Settings -->
        <div class="global-panel">
            <div class="panel-header">
                <span>🌍</span>
                <span>Global Settings</span>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Select Pair</label>
                    <select id="globalPair" onchange="updateAllCalculations()">
                        <option value="XAGUSD">XAGUSD (Silver)</option>
                        <option value="BTCUSD">BTCUSD (Bitcoin)</option>
                        <option value="AUDNZD">AUDNZD (Forex)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Common Stop Loss (Pips/Points)</label>
                    <input type="number" id="globalSL" placeholder="e.g., 3.75388" step="0.00001" oninput="applyCommonSL()">
                </div>
                <div class="form-group">
                    <label>Quick Action</label>
                    <button class="btn btn-secondary" onclick="applyCommonToAll()" style="width: 100%;">
                        Apply Common SL to All Accounts
                    </button>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <div class="panel-header">
                <span>⚙️</span>
                <span>Account Management</span>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="addAccount()">
                    <span>+</span> Add New Account
                </button>
                <button class="btn btn-secondary" onclick="savePreset()">
                    💾 Save Preset
                </button>
                <button class="btn btn-secondary" onclick="loadPreset()">
                    📂 Load Preset
                </button>
                <button class="btn btn-secondary" onclick="exportResults()">
                    📊 Export Results
                </button>
                <button class="btn btn-danger" onclick="clearAll()">
                    🗑️ Clear All
                </button>
            </div>
        </div>

        <!-- Accounts Section -->
        <div class="accounts-section">
            <div class="section-header">
                <h2>Trading Accounts</h2>
                <span id="accountCount" style="color: var(--text-secondary);">0 accounts</span>
            </div>
            <div class="accounts-grid" id="accountsContainer">
                <!-- Accounts will be added here dynamically -->
            </div>
        </div>

        <!-- Summary Panel -->
        <div class="summary-panel">
            <div class="summary-grid">
                <div class="summary-item">
                    <h3>Total Accounts</h3>
                    <div class="value" id="totalAccounts">0</div>
                </div>
                <div class="summary-item">
                    <h3>Total Risk Amount</h3>
                    <div class="value" id="totalRisk">$0</div>
                </div>
                <div class="summary-item">
                    <h3>Total Lots</h3>
                    <div class="value" id="totalLots">0.00</div>
                </div>
                <div class="summary-item">
                    <h3>Selected Pair</h3>
                    <div class="value" id="summaryPair">XAGUSD</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        let accountCounter = 0;
        const accounts = new Map();

        // Initialize with 3 default accounts
        window.onload = function() {
            addAccount('Main Account');
            addAccount('Prop Firm 1');
            addAccount('Prop Firm 2');
        };

        function addAccount(name = null) {
            accountCounter++;
            const accountId = `account-${accountCounter}`;
            const accountName = name || `Account ${accountCounter}`;
            
            const container = document.getElementById('accountsContainer');
            const card = document.createElement('div');
            card.className = 'account-card';
            card.id = accountId;
            
            const isXAGUSD = document.getElementById('globalPair').value === 'XAGUSD';
            
            card.innerHTML = `
                <div class="account-header">
                    <input type="text" class="account-name-input" value="${accountName}" placeholder="Account Name">
                    <button class="btn btn-danger" onclick="removeAccount('${accountId}')">Remove</button>
                </div>
                
                <div class="account-fields">
                    <div class="field-row">
                        <div class="input-group">
                            <label>Risk Amount ($)</label>
                            <input type="number" class="risk-amount" placeholder="150" oninput="calculateLotSize('${accountId}')">
                        </div>
                        <div class="input-group">
                            <label>Stop Loss (Pips/Points)</label>
                            <input type="number" class="sl-pips" placeholder="3.75388" step="0.00001" oninput="calculateLotSize('${accountId}')">
                        </div>
                    </div>
                    
                    ${isXAGUSD ? `
                    <div class="input-group">
                        <label>Contract Size (oz)</label>
                        <input type="number" class="contract-size" placeholder="5000" value="5000" oninput="calculateLotSize('${accountId}')">
                    </div>
                    ` : ''}
                    
                    <div class="result-box">
                        <div class="result-label">Recommended Lot Size</div>
                        <div class="result-value" id="result-${accountId}">0.00</div>
                        <div class="result-detail" id="detail-${accountId}">Enter values to calculate</div>
                    </div>
                    
                    <button class="btn btn-secondary" onclick="copyResult('${accountId}')" style="width: 100%; margin-top: 0.5rem;">
                        📋 Copy Lot Size
                    </button>
                </div>
            `;
            
            container.appendChild(card);
            accounts.set(accountId, { element: card });
            updateAccountCount();
            
            // Animate in
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.3s';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 10);
        }

        function removeAccount(accountId) {
            const card = document.getElementById(accountId);
            card.style.transform = 'translateX(100%)';
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                accounts.delete(accountId);
                updateAccountCount();
                updateSummary();
            }, 300);
        }

        function calculateLotSize(accountId) {
            const card = document.getElementById(accountId);
            const pair = document.getElementById('globalPair').value;
            
            const riskAmount = parseFloat(card.querySelector('.risk-amount').value) || 0;
            const slPips = parseFloat(card.querySelector('.sl-pips').value) || 0;
            
            let lotSize = 0;
            let detailText = '';
            
            if (pair === 'XAGUSD') {
                const contractSize = parseFloat(card.querySelector('.contract-size').value) || 5000;
                
                if (riskAmount > 0 && slPips > 0) {
                    // Formula: Risk / (SL * Contract Size) * 100000 for standard lots
                    // Adjusted for silver: Risk / SL / Contract Size * 100000
                    lotSize = (riskAmount / slPips) / contractSize;
                    lotSize = Math.round(lotSize * 100) / 100; // Round to 2 decimals
                    
                    detailText = `Risk: $${riskAmount} | SL: ${slPips} | Contract: ${contractSize}`;
                }
            } else {
                // Standard forex/crypto calculation
                if (riskAmount > 0 && slPips > 0) {
                    lotSize = riskAmount / (slPips * 10); // Simplified for demo
                    lotSize = Math.round(lotSize * 100) / 100;
                    detailText = `Risk: $${riskAmount} | SL: ${slPips} pips`;
                }
            }
            
            const resultEl = document.getElementById(`result-${accountId}`);
            const detailEl = document.getElementById(`detail-${accountId}`);
            
            resultEl.textContent = lotSize > 0 ? lotSize.toFixed(2) : '0.00';
            detailEl.textContent = detailText || 'Enter values to calculate';
            
            // Visual feedback
            if (lotSize > 0) {
                resultEl.style.color = 'var(--accent-green)';
            } else {
                resultEl.style.color = 'var(--text-secondary)';
            }
            
            updateSummary();
        }

        function applyCommonSL() {
            const commonSL = document.getElementById('globalSL').value;
            if (!commonSL) return;
            
            document.querySelectorAll('.sl-pips').forEach(input => {
                input.value = commonSL;
            });
            
            // Recalculate all
            accounts.forEach((_, accountId) => {
                calculateLotSize(accountId);
            });
        }

        function applyCommonToAll() {
            applyCommonSL();
            showToast('Common SL applied to all accounts!');
        }

        function updateAllCalculations() {
            const pair = document.getElementById('globalPair').value;
            document.getElementById('summaryPair').textContent = pair;
            
            // Re-render accounts if switching to/from XAGUSD
            // For now, just recalculate
            accounts.forEach((_, accountId) => {
                calculateLotSize(accountId);
            });
        }

        function updateAccountCount() {
            const count = accounts.size;
            document.getElementById('accountCount').textContent = `${count} account${count !== 1 ? 's' : ''}`;
            document.getElementById('totalAccounts').textContent = count;
        }

        function updateSummary() {
            let totalRisk = 0;
            let totalLots = 0;
            
            accounts.forEach((_, accountId) => {
                const card = document.getElementById(accountId);
                const risk = parseFloat(card.querySelector('.risk-amount').value) || 0;
                const lots = parseFloat(document.getElementById(`result-${accountId}`).textContent) || 0;
                
                totalRisk += risk;
                totalLots += lots;
            });
            
            document.getElementById('totalRisk').textContent = `$${totalRisk.toLocaleString()}`;
            document.getElementById('totalLots').textContent = totalLots.toFixed(2);
        }

        function copyResult(accountId) {
            const lotSize = document.getElementById(`result-${accountId}`).textContent;
            navigator.clipboard.writeText(lotSize).then(() => {
                showToast(`Copied: ${lotSize} lots`);
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function savePreset() {
            const data = [];
            accounts.forEach((_, accountId) => {
                const card = document.getElementById(accountId);
                data.push({
                    name: card.querySelector('.account-name-input').value,
                    risk: card.querySelector('.risk-amount').value,
                    sl: card.querySelector('.sl-pips').value,
                    contract: card.querySelector('.contract-size')?.value || ''
                });
            });
            
            localStorage.setItem('tradingPreset', JSON.stringify(data));
            showToast('Preset saved!');
        }

        function loadPreset() {
            const saved = localStorage.getItem('tradingPreset');
            if (!saved) {
                showToast('No preset found!');
                return;
            }
            
            const data = JSON.parse(saved);
            // Clear and reload
            document.getElementById('accountsContainer').innerHTML = '';
            accounts.clear();
            accountCounter = 0;
            
            data.forEach(acc => {
                addAccount(acc.name);
                const card = document.getElementById(`account-${accountCounter}`);
                card.querySelector('.risk-amount').value = acc.risk;
                card.querySelector('.sl-pips').value = acc.sl;
                if (acc.contract) {
                    const contractInput = card.querySelector('.contract-size');
                    if (contractInput) contractInput.value = acc.contract;
                }
                calculateLotSize(`account-${accountCounter}`);
            });
            
            showToast('Preset loaded!');
        }

        function exportResults() {
            let csv = 'Account Name,Risk Amount,Stop Loss,Contract Size,Lot Size\n';
            
            accounts.forEach((_, accountId) => {
                const card = document.getElementById(accountId);
                const name = card.querySelector('.account-name-input').value;
                const risk = card.querySelector('.risk-amount').value || 0;
                const sl = card.querySelector('.sl-pips').value || 0;
                const contract = card.querySelector('.contract-size')?.value || 'N/A';
                const lots = document.getElementById(`result-${accountId}`).textContent;
                
                csv += `"${name}",${risk},${sl},${contract},${lots}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `position-sizing-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showToast('Results exported!');
        }

        function clearAll() {
            if (!confirm('Clear all accounts?')) return;
            document.getElementById('accountsContainer').innerHTML = '';
            accounts.clear();
            accountCounter = 0;
            updateAccountCount();
            updateSummary();
            showToast('All accounts cleared!');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                addAccount();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                savePreset();
            }
        });
    </script>
</body>
</html>
